<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اشتراک یافت نشد</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Vazirmatn -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Vazirmatn', 'sans-serif'],
                    },
                    colors: {
                        darkBg: '#0f172a',
                        cardBg: '#1e293b',
                        accent: '#38bdf8',
                        danger: '#ef4444',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full text-center">
        <!-- Error Icon -->
        <div class="w-24 h-24 bg-danger/20 rounded-full flex items-center justify-center mx-auto mb-6 text-danger text-5xl shadow-[0_0_20px_rgba(239,68,68,0.3)] animate-pulse">
            <i class="fa-solid fa-link-slash"></i>
        </div>
        
        <h1 class="text-4xl font-black text-white mb-4">یافت نشد!</h1>
        
        <div class="glass-card rounded-2xl p-6 shadow-xl shadow-black/30 mb-8">
            <p class="text-slate-300 text-sm leading-relaxed">
                متأسفانه اشتراک مورد نظر شما یافت نشد، یا منقضی شده و یا لینک آن اشتباه است. لطفاً لینک خود را مجدداً بررسی کنید.
            </p>
        </div>
        
        <a href="javascript:history.back()" class="inline-flex items-center justify-center gap-2 text-darkBg bg-slate-200 hover:bg-white font-bold rounded-lg text-sm px-6 py-3 transition-all shadow-lg hover:shadow-xl">
            <i class="fa-solid fa-arrow-right"></i>
            بازگشت به صفحه قبل
        </a>
    </div>

</body>
</html>
